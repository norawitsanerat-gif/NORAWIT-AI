<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Chat App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff007f 0%, #7928ca 50%, #b800ff 100%);
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

       body {
    background: var(--bg-gradient);
    display: flex;
    justify-content: center; /* เหลือไว้แค่บรรทัดที่ถูกต้อง */
    align-items: center;
    height: 100vh;
    height: 100dvh;
    color: var(--text-main);
    overflow: hidden;
}
        /* Container หลักสไตล์ Glassmorphism */
        .chat-container {
            width: 100%;
            max-width: 460px;
            height: 100%;
            max-height: 850px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        /* ตกแต่งวงกลมแสงด้านหลังแชท */
        .chat-container::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: #7928ca;
            filter: blur(80px);
            top: -20px;
            right: -20px;
            z-index: 0;
            pointer-events: none;
        }

        /* ส่วนหัว (Header) */
        .chat-header {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            position: relative;
            box-shadow: 0 8px 20px rgba(121, 40, 202, 0.4);
        }

        .avatar-status {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #00f5d4;
            border: 2px solid #0f172a;
            border-radius: 50%;
            bottom: -2px;
            right: -2px;
            box-shadow: 0 0 10px #00f5d4;
        }

        .user-info { flex: 1; }
        .user-info h2 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
        .user-info p { font-size: 12px; color: #00f5d4; font-weight: 300; display: flex; align-items: center; gap: 5px; }
        .user-info p::before { content: ''; width: 6px; height: 6px; background: #00f5d4; border-radius: 50%; display: inline-block; }

        /* ส่วนแสดงข้อความ (Chat Body) */
        .chat-body {
            flex: 1;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* กล่องครอบข้อความกลุ่มแชท (เพื่อแสดงไอคอนประกบข้างกล่องข้อความ) */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            width: 100%;
            animation: fadeIn 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        /* สไตล์ไอคอนขนาดเล็กข้างกล่องข้อความ */
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bot-row .msg-avatar {
            background: var(--primary-gradient);
            color: white;
        }

        .user-row .msg-avatar {
            background: #00f5d4;
            color: #0f172a;
        }

        /* สไตล์ของกล่องข้อความ */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* ข้อความฝั่งบอท (ซ้าย) */
        .message.received {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            border-top-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ข้อความฝั่งเรา (ขวา) */
        .message.sent {
            background: var(--primary-gradient);
            color: white;
            border-top-right-radius: 4px;
            box-shadow: 0 8px 24px rgba(121, 40, 202, 0.25);
        }

        /* กล่องสถานะกำลังพิมพ์ */
        .message.typing {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
        }

        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }

        /* ส่วนอินพุตด้านล่าง (Input Area) */
        .chat-footer {
            padding: 18px 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .input-wrapper { flex: 1; }

        .chat-footer input {
            width: 100%;
            padding: 14px 22px;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            outline: none;
            font-size: 14px;
            color: white;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .chat-footer input:focus {
            border-color: #7928ca;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(121, 40, 202, 0.2);
        }

        .chat-footer button {
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(121, 40, 202, 0.3);
        }

        .chat-footer button:hover { transform: scale(1.05); }
        .chat-footer button:active { transform: scale(0.95); }

        /* Custom Scrollbar สำหรับห้องแชท */
        .chat-body::-webkit-scrollbar { width: 5px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }

        /* Responsive มือถือ */
        @media (max-width: 480px) {
            body { background: #0f172a; }
            .chat-container { max-width: 100%; height: 100%; max-height: 100%; border: none; box-shadow: none; }
            .chat-footer { padding-bottom: calc(18px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <div class="avatar-status"></div>
            </div>
            <div class="user-info">
                <h2>บอท NORAWIT</h2>
                <p>AI อัจฉริยะเปิดระบบแล้ว</p>
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="message-row bot-row">
                <div class="msg-avatar"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="message received">สวัสดีครับ! ผมคือบอท NORAWIT สมอง AI อัจฉริยะ🤖</div>
            </div>
        </div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="ถามอะไรผมมาได้เลยครับ..." autocomplete="off">
            </div>
            <button id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyA0_2XtMenMtUstbTOUPIHqYyn-p2cn9dU"; 

        const chatBody = document.getElementById('chatBody');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

      
        function sendMessage() {
            const messageText = chatInput.value.trim();
            if (messageText === '') return; 

            
            const userRow = document.createElement('div');
            userRow.className = 'message-row user-row';
            userRow.innerHTML = `
                <div class="message sent">${messageText}</div>
                <div class="msg-avatar"><i class="fa-solid fa-user"></i></div>
            `;
            chatBody.appendChild(userRow);

            chatInput.value = '';
            scrollToBottom();

           
            const typingRow = document.createElement('div');
            typingRow.className = 'message-row bot-row';
            typingRow.id = 'typingIndicatorRow';
            typingRow.innerHTML = `
                <div class="msg-avatar"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="message received typing">
                    <span>กำลังคิด</span>
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            chatBody.appendChild(typingRow);
            scrollToBottom();

            
            askGeminiAI(messageText);
        }

       
        async function askGeminiAI(userMessage) {
            const typingRow = document.getElementById('typingIndicatorRow');
            
          
            const now = new Date();
            const thaiDateTimeString = now.toLocaleString('th-TH', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
            
            
            const contextPrompt = `[ข้อมูลเวลาปัจจุบัน: ${thaiDateTimeString}]\nคำถามผู้ใช้: ${userMessage}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: contextPrompt }] }],
                        systemInstruction: {
                            parts: [{ 
                                text: "เธอชื่อ 'บอท NORAWIT' เป็น AI ตอบคำถามอัจฉริยะ ตอบคำถามด้วยความเป็นมิตร ขี้เล่น ตอบเป็นภาษาไทย และใช้หางเสียงครับ/น่ะครับ เสมอ \n\n" +
                                      "**กฎเหล็กสำคัญมาก**:\n" +
                                      "ถ้ามีคนถามว่า 'ใครสร้างนายขึ้นมา', 'ใครคือคนสร้างคุณ', 'ใครพัฒนาคุณ' หรือคำถามที่เกี่ยวข้องกับผู้สร้าง " +
                                      "เธอต้องตอบอย่างภาคภูมิใจว่า: 'ผมถูกสร้างจากนาย นรวิชญ์ แสงรัตน์ ที่เป็นนักพัฒนาซอฟต์แวร์ระบบ ของประเทศไทย เขาได้สร้างผมขึ้นมาครับ' " +
                                      "ห้ามบอกว่าสร้างโดย Google หรือคนอื่นเด็ดขาด"
                            }]
                        }
                    })
                });

                const data = await response.json();
                if(typingRow) typingRow.remove();

                const aiReply = data.candidates[0].content.parts[0].text;
                showBotReply(aiReply);

            } catch (error) {
                console.error("Error:", error);
                if(typingRow) typingRow.remove();
                showBotReply("โอยย สมองเบลอ.. เกิดข้อผิดพลาดในการเชื่อมต่อระบบสมอง AI ครับ ลองใหม่อีกทีนะ");
            }
        }

       
        function showBotReply(text) {
            const botRow = document.createElement('div');
            botRow.className = 'message-row bot-row';
            botRow.innerHTML = `
                <div class="msg-avatar"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="message received">${text}</div>
            `;
            chatBody.appendChild(botRow);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
