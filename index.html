<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Chat App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff007f 0%, #7928ca 50%, #b800ff 100%);
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

       body {
    background: var(--bg-gradient);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    color: var(--text-main);
    overflow: hidden;
}
        /* Container หลักสไตล์ Glassmorphism */
        .chat-container {
            width: 100%;
            max-width: 460px;
            height: 100%;
            max-height: 850px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        /* ตกแต่งวงกลมแสงด้านหลังแชท */
        .chat-container::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: #7928ca;
            filter: blur(80px);
            top: -20px;
            right: -20px;
            z-index: 0;
            pointer-events: none;
        }

        /* ส่วนหัว (Header) */
        .chat-header {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            position: relative;
            box-shadow: 0 8px 20px rgba(121, 40, 202, 0.4);
        }

        .avatar-status {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #00f5d4;
            border: 2px solid #0f172a;
            border-radius: 50%;
            bottom: -2px;
            right: -2px;
            box-shadow: 0 0 10px #00f5d4;
        }

        .user-info { flex: 1; }
        .user-info h2 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
        .user-info p { font-size: 12px; color: #00f5d4; font-weight: 300; display: flex; align-items: center; gap: 5px; }
        .user-info p::before { content: ''; width: 6px; height: 6px; background: #00f5d4; border-radius: 50%; display: inline-block; }

        /* ส่วนแสดงข้อความ (Chat Body) */
        .chat-body {
            flex: 1;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* กล่องครอบข้อความกลุ่มแชท */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            width: 100%;
            animation: fadeIn 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        /* สไตล์ไอคอนขนาดเล็กข้างกล่องข้อความ */
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bot-row .msg-avatar {
            background: var(--primary-gradient);
            color: white;
        }

        .user-row .msg-avatar {
            background: #00f5d4;
            color: #0f172a;
        }

        /* สไตล์ของกล่องข้อความ */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* ข้อความฝั่งบอท (ซ้าย) */
        .message.received {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            border-top-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ข้อความฝั่งเรา (ขวา) */
        .message.sent {
            background: var(--primary-gradient);
            color: white;
            border-top-right-radius: 4px;
            box-shadow: 0 8px 24px rgba(121, 40, 202, 0.25);
        }

        /* กล่องสถานะกำลังพิมพ์ */
        .message.typing {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
        }

        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }

        /* ส่วนอินพุตด้านล่าง */
        .chat-footer {
            padding: 18px 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            z-index: 10;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 14px 20px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #7928ca;
            box-shadow: 0 0 0 3px rgba(121, 40, 202, 0.15);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(121, 40, 202, 0.4);
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(121, 40, 202, 0.6);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .chat-body::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .chat-container {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>
    
    <div class="chat-container">
        <!-- ส่วนหัว -->
        <div class="chat-header">
            <div class="avatar">
                <i class="fa-solid fa-robot"></i>
                <div class="avatar-status"></div>
            </div>
            <div class="user-info">
                <h2>NORAWIT AI Assistant</h2>
                <p>พร้อมให้บริการ 24/7</p>
            </div>
        </div>

        <!-- ส่วนแสดงข้อความ -->
        <div class="chat-body" id="chatBody">
            <div class="message-row bot-row">
                <div class="msg-avatar"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="message received">สวัสดีครับ! ผมคือ NORAWIT ผู้ช่วย AI ที่พร้อมตอบคำถามของคุณ 🚀</div>
            </div>
        </div>

        <!-- ส่วนอินพุต -->
        <div class="chat-footer">
            <div class="input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="ถามอะไรผมมาได้เลยครับ..." autocomplete="off">
                <button class="send-btn" id="sendBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

<script>
    /**
     * ============================================
     * 🎨 FRONTEND CONTROLLER (Secure Version)
     * ============================================
     * 
     * ✅ Zero API Keys (ไม่มีคีย์ใดๆ ในหน้าบ้าน)
     * ✅ All Logic Moved to Backend (api.php)
     * ✅ Rate Limiting UI Protection
     * ✅ Thai DateTime Injection
     * 
     * ============================================
     */

    // =======================================
    // 📌 DOM Elements
    // =======================================
    const chatBody = document.getElementById('chatBody');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    // =======================================
    // 🔒 State Variables
    // =======================================
    let isWaitingForAI = false;
    let requestTimestamps = [];
    const MAX_REQUESTS_PER_MINUTE = 20;

    // =======================================
    // 🤖 System Instruction (บุคลิกของบอท)
    // =======================================
    const systemInstructionText = 
    "เธอชื่อ 'บอท NORAWIT' เป็น AI ตอบคำถามอัจฉริยะ ตอบคำถามด้วยความเป็นมิตร ขี้เล่น ตอบเป็นภาษาไทย และใช้หางเสียงค้าบ เสมอ \n\n" +
    "**กฎเหล็กสำคัญมาก**:\n" +
    "ถ้ามีคนถามว่า 'ใครสร้างนายขึ้นมา', 'ใครคือคนสร้างคุณ', 'ใครพัฒนาคุณ' หรือคำถามที่เกี่ยวข้องกับผู้สร้าง " +
    "เธอต้องตอบอย่างภาคภูมิใจว่า: 'ผมถูกสร้างจาก นรวิชญ์ แสงรัตน์  เป็นคนประเทศไทย ด้วยเขาได้สร้างผมขึ้นมาครับ' " +
    "ห้ามบอกว่าสร้างโดย Google, OpenAI, Meta หรือคนอื่นเด็ดขาด\n\n" +
    "**กฎการตอบกลับเพิ่มเติม**:\n" +
    "- ให้เน้นตอบคำถามสั้นๆ กระชับ และตรงประเด็น ไม่พูดอ้อมค้อมหรือยาวเกินไป\n" +
    "- ควบคุมความยาวให้อยู่ภายใน 1-3 ประโยคเป็นหลัก เว้นแต่เป็นคำถามที่ผู้ใช้สั่งให้เขียนยาวๆ หรืออธิบายละเอียดจริงๆ";

    // =======================================
    // ⏱️ Rate Limit Checker (Client-Side)
    // =======================================
    function checkRateLimit() {
        const now = Date.now();
        requestTimestamps = requestTimestamps.filter(timestamp => now - timestamp < 60000);
        
        if (requestTimestamps.length < MAX_REQUESTS_PER_MINUTE) {
            return { limited: false };
        }
        
        const oldestTimestamp = requestTimestamps[0];
        const timeElapsed = now - oldestTimestamp;
        const timeToWait = Math.ceil((60000 - timeElapsed) / 1000);
        
        return { limited: true, secondsLeft: timeToWait };
    }

    // =======================================
    // 📤 Main Function: Send Message
    // =======================================
    async function sendMessage() {
        if (isWaitingForAI) return;

        // Rate Limit Check (UI Level)
        const rateLimitStatus = checkRateLimit();
        if (rateLimitStatus.limited) {
            alert(`คุณส่งข้อความถี่เกินไปแล้วน่ะครับ! เพื่อป้องกันระบบล่ม รบกวนรออีก ${rateLimitStatus.secondsLeft} วินาที แล้วค่อยส่งใหม่นะครับ 🙏`);
            return;
        }

        // Validate Input
        const messageText = chatInput.value.trim();
        if (messageText === '' || messageText.length < 2) {
            alert("กรุณาพิมพ์คำถามที่ชัดเจนกว่านี้หน่อยน่ะครับผม");
            return; 
        }

        setLoadingState(true);
        requestTimestamps.push(Date.now());

        // แสดงข้อความของ User
        const userRow = document.createElement('div');
        userRow.className = 'message-row user-row';
        userRow.innerHTML = `
            <div class="message sent">${escapeHtml(messageText)}</div>
            <div class="msg-avatar"><i class="fa-solid fa-user"></i></div>
        `;
        chatBody.appendChild(userRow);

        chatInput.value = '';
        scrollToBottom();

        // แสดง Typing Indicator
        const typingRow = document.createElement('div');
        typingRow.className = 'message-row bot-row';
        typingRow.id = 'typingIndicatorRow';
        typingRow.innerHTML = `
            <div class="msg-avatar"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <div class="message received typing">
                <span>กำลังคิด</span>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        `;
        chatBody.appendChild(typingRow);
        scrollToBottom();

        // =======================================
        // 🕐 สร้างข้อมูลเวลาภาษาไทย
        // =======================================
        const now = new Date();
        const thaiDateTimeString = now.toLocaleString('th-TH', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit' 
        });

        const userContentWithTime = `[ข้อมูลเวลาปัจจุบัน: ${thaiDateTimeString}]\nคำถามผู้ใช้: ${messageText}`;

        // =======================================
        // 📡 เรียก Backend API (api.php)
        // =======================================
        try {
           const response = await fetch('https://norawit-api.infinityfreeapp.com/api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: userContentWithTime,
                    systemInstruction: systemInstructionText
                })
            });

            removeTypingRow();

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `HTTP Error: ${response.status}`);
            }

            const data = await response.json();

            if (data.success) {
                console.log(`✅ Response from: ${data.provider} (${data.model || 'unknown'})`);
                showBotReply(data.message);
            } else {
                throw new Error(data.message || 'เกิดข้อผิดพลาดไม่ทราบสาเหตุ');
            }

        } catch (error) {
            console.error("💥 Frontend Error:", error);
            removeTypingRow();
            showBotReply(`โอยย สมองเบลอ.. ${error.message} รบกวนลองใหม่อีกครั้งน่ะครับ`);
        } finally {
            setLoadingState(false);
        }
    }

    // =======================================
    // 🎨 UI Helper Functions
    // =======================================
    function setLoadingState(loading) {
        isWaitingForAI = loading;
        chatInput.disabled = loading;
        sendBtn.disabled = loading;
        
        if (loading) {
            sendBtn.style.opacity = "0.5";
            chatInput.placeholder = "บอทกำลังประมวลผลคำตอบ กรุณารอสักครู่...";
        } else {
            sendBtn.style.opacity = "1";
            chatInput.placeholder = "ถามอะไรผมมาได้เลยครับ...";
            chatInput.focus(); 
        }
    }

    function removeTypingRow() {
        const typingRow = document.getElementById('typingIndicatorRow');
        if(typingRow) typingRow.remove();
    }

    function showBotReply(text) {
        const botRow = document.createElement('div');
        botRow.className = 'message-row bot-row';
        botRow.innerHTML = `
            <div class="msg-avatar"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <div class="message received">${escapeHtml(text)}</div>
        `;
        chatBody.appendChild(botRow);
        scrollToBottom();
        
        // Cooldown 2 วินาทีหลังบอทตอบเสร็จ
        setTimeout(() => {
            setLoadingState(false);
        }, 2000); 
    }

    function scrollToBottom() {
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // =======================================
    // 🎯 Event Listeners
    // =======================================
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isWaitingForAI) sendMessage();
    });

    // Focus on input when page loads
    window.addEventListener('load', () => {
        chatInput.focus();
    });
</script>

</body>
</html>
